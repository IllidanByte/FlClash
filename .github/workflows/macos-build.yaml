name: macos-build

on:
  workflow_dispatch:
    inputs:
      arch:
        description: macOS artifact architecture
        type: choice
        default: all
        options:
          - all
          - amd64
          - arm64
      env:
        description: Application environment
        type: choice
        default: pre
        options:
          - pre
          - stable

concurrency:
  group: macos-build-${{ github.ref }}-${{ inputs.arch }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.arch == 'amd64' && '[{"platform":"macos","os":"macos-15-intel","arch":"amd64"}]' || inputs.arch == 'arm64' && '[{"platform":"macos","os":"macos-latest","arch":"arm64"}]' || '[{"platform":"macos","os":"macos-15-intel","arch":"amd64"},{"platform":"macos","os":"macos-latest","arch":"arm64"}]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4
          cache: true

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app || sudo xcode-select -s /Applications/Xcode_26.2.app
          xcodebuild -version

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Setup
        run: dart setup.dart ${{ matrix.platform }} --env ${{ inputs.env }} -v

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}-${{ matrix.arch }}
          path: ./dist
          overwrite: true
